<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pubEleC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景 */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 25%, #f5f9ff 50%, #e8f4f8 75%, #f0f7ff 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮动气泡效果 */
        .floating-bubbles {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .bubble:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            width: 120px;
            height: 120px;
            left: 70%;
            animation-delay: 5s;
        }

        .bubble:nth-child(3) {
            width: 60px;
            height: 60px;
            left: 40%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-100px) rotate(120deg); }
            66% { transform: translateY(100px) rotate(240deg); }
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .login-box:hover {
            /* transform: translateY(-5px); */
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            color: #2c3e50;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #95a5a6;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        /* 登录后显示的内容 */
        .welcome-content {
            display: none;
            text-align: center;
        }

        .welcome-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .welcome-content p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-bg"></div>
    <div class="floating-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="login-box" id="loginBox">
            <div class="login-form" id="loginForm">
                <div class="login-header">
                    <h1>欢迎登录</h1>
                    <p>请输入您的账户信息</p>
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>

                <button class="login-btn" onclick="handleLogin()">登录</button>

                <div class="error-message" id="errorMessage">用户名或密码错误</div>
                <div class="success-message" id="successMessage">登录成功！</div>
            </div>

            <div class="welcome-content" id="welcomeContent">
                <h2>登录成功！</h2>
                <p>欢迎回来，<span id="userDisplay">用户</span>！</p>
                <p>这是一个具有动态浅色背景和登录功能的网站示例。</p>
                <button class="logout-btn" onclick="handleLogout()">退出登录</button>
            </div>
        </div>
    </div>

    <script>
        // 简单的登录验证
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清除之前的提示信息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // 验证用户名
            if (!username) {
                errorMessage.textContent = '未输入账户';
                errorMessage.style.display = 'block';
                document.getElementById('username').focus();
                return;
            }

            // 验证密码
            if (!password) {
                errorMessage.textContent = '未输入密码';
                errorMessage.style.display = 'block';
                document.getElementById('password').focus();
                return;
            }

            // 验证用户名和密码是否正确
            if (username === 'admin' && password === '123456') {
                // 登录成功
                successMessage.style.display = 'block';
                document.getElementById('userDisplay').textContent = username;

                setTimeout(() => {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('welcomeContent').style.display = 'block';
                    document.getElementById('loginBox').style.maxWidth = '500px';
                }, 1000);
            } else {
                // 登录失败
                errorMessage.textContent = '账户或密码有问题';
                errorMessage.style.display = 'block';
            }
        }

        // 退出登录
        function handleLogout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('welcomeContent').style.display = 'none';
            document.getElementById('loginBox').style.maxWidth = '400px';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // 回车键登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // 页面加载完成后的欢迎提示
        window.onload = function() {
            console.log('网站已加载完成！使用用户名：admin，密码：123456 进行登录测试');
        };
    </script>
</body>
</html>
